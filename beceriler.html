<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Becerilerim | Mert Üzüm</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

nav{
background:#000;
padding:20px;
display:flex;
justify-content:center;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00c6ff;
}

.container{
width:90%;
max-width:900px;
margin:70px auto;
}

h1{
text-align:center;
margin-bottom:40px;
}

.skill{
margin-bottom:30px;
}

.skill p{
margin-bottom:8px;
font-size:18px;
}

.bar{
height:18px;
background:#333;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#00c6ff,#00ff95);
border-radius:20px;
animation:grow 2s forwards;
}

.html{
width:90%;
}

.css{
width:80%;
}

.js{
width:35%;
}

.python{
width:30%;
}

@keyframes grow{

from{
width:0;
}

}

.btn{

display:inline-block;
margin-top:40px;
padding:12px 22px;
background:#00c6ff;
color:white;
text-decoration:none;
border-radius:10px;

}

.btn:hover{

background:#0095c9;

}

</style>

</head>

<body>

<nav>

<a href="index.html">Ana Sayfa</a>

<a href="hakkimda.html">Hakkımda</a>

<a href="projeler.html">Projeler</a>

<a href="iletisim.html">İletişim</a>

</nav>

<div class="container">

<h1>Becerilerim</h1>

<div class="skill">
<p>HTML %90</p>
<div class="bar">
<div class="fill html"></div>
</div>
</div>

<div class="skill">
<p>CSS %80</p>
<div class="bar">
<div class="fill css"></div>
</div>
</div>

<div class="skill">
<p>JavaScript %35</p>
<div class="bar">
<div class="fill js"></div>
</div>
</div>

<div class="skill">
<p>Python %30</p>
<div class="bar">
<div class="fill python"></div>
</div>
</div>

<a href="index.html" class="btn">
← Ana Sayfaya Dön
</a>

</div>

</body>
</html>
